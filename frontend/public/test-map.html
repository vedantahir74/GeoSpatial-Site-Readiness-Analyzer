<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Map Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    osm: {
                        type: 'raster',
                        tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'],
                        tileSize: 256
                    }
                },
                layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
            },
            center: [72.5714, 23.0225],
            zoom: 12
        });

        map.addControl(new maplibregl.NavigationControl());

        map.on('load', () => {
            console.log('Map loaded successfully!');
            alert('Map is working! You should see Ahmedabad, India.');
        });

        map.on('click', async (e) => {
            const { lat, lng } = e.lngLat;
            console.log('Clicked:', lat, lng);
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/score/point', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lng })
                });
                const data = await response.json();
                
                new maplibregl.Popup()
                    .setLngLat([lng, lat])
                    .setHTML(`
                        <div style="padding:15px">
                            <h3>Score: ${data.composite_score.toFixed(1)}</h3>
                            <p>Demographics: ${data.layer_scores.demographics.toFixed(1)}</p>
                            <p>Transport: ${data.layer_scores.transport.toFixed(1)}</p>
                        </div>
                    `)
                    .addTo(map);
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
