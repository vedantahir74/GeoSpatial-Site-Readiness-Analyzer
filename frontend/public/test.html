<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1d29; color: white; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #2d3748; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Backend API Test</h1>
    <button onclick="testAPI()">Test Scoring API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Loading...';
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/score/point', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        lat: 23.0225,
                        lng: 72.5714
                    })
                });
                
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.style.background = '#065f46';
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                resultDiv.style.background = '#991b1b';
            }
        }
    </script>
</body>
</html>
