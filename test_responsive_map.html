<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Map Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        
        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            flex-direction: row;
        }
        
        .map-section {
            flex: 1;
            background: linear-gradient(135deg, #e8f5e8 0%, #f0f8ff 50%, #e0f2fe 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #1976d2;
            font-weight: bold;
        }
        
        .sidebar {
            width: 420px;
            background: #f8fafc;
            border-left: 1px solid #e2e8f0;
            padding: 20px;
            overflow-y: auto;
        }
        
        .test-button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        
        .test-button:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }
        
        .result {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .score-display {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .score-breakdown {
            margin: 20px 0;
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
        }
        
        .score-bar {
            width: 100px;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 10px;
        }
        
        .score-fill {
            height: 100%;
            border-radius: 4px;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .map-section {
                height: 60vh;
                min-height: 400px;
            }
            
            .sidebar {
                width: 100%;
                height: 40vh;
                min-height: 300px;
                border-left: none;
                border-top: 1px solid #e2e8f0;
                padding: 16px;
            }
            
            .score-display {
                font-size: 36px;
            }
        }
        
        @media (max-width: 480px) {
            .sidebar {
                padding: 12px;
            }
            
            .score-display {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map-section">
            📍 Responsive Map Area<br>
            <small style="font-size: 16px; font-weight: normal;">Resize window to test responsiveness</small>
        </div>
        
        <div class="sidebar">
            <h1 style="margin-bottom: 20px; color: #1e293b;">Gujarat Site Analyzer</h1>
            
            <button class="test-button" onclick="testAPI()">🔍 Test API Call</button>
            <button class="test-button" onclick="testResponsive()">📱 Test Responsive Layout</button>
            
            <div id="result" style="display: none;">
                <div class="result">
                    <div class="score-display" id="score" style="color: #10b981;">--</div>
                    <div style="text-align: center; margin-bottom: 20px;">
                        <strong id="location">--</strong>
                    </div>
                    
                    <div class="score-breakdown">
                        <h3 style="margin-bottom: 15px;">Score Breakdown</h3>
                        
                        <div class="score-item">
                            <span>👥 Demographics</span>
                            <div class="score-bar">
                                <div class="score-fill" id="demo-bar" style="background: #10b981;"></div>
                            </div>
                            <span id="demo-score">--</span>
                        </div>
                        
                        <div class="score-item">
                            <span>🏪 Competition</span>
                            <div class="score-bar">
                                <div class="score-fill" id="comp-bar" style="background: #f59e0b;"></div>
                            </div>
                            <span id="comp-score">--</span>
                        </div>
                        
                        <div class="score-item">
                            <span>🛣️ Transport</span>
                            <div class="score-bar">
                                <div class="score-fill" id="trans-bar" style="background: #3b82f6;"></div>
                            </div>
                            <span id="trans-score">--</span>
                        </div>
                    </div>
                    
                    <div style="background: #d1fae5; padding: 16px; border-radius: 8px; margin-top: 20px;">
                        <strong id="recommendation">--</strong>
                        <p id="reason" style="margin: 10px 0; font-size: 14px;">--</p>
                        <div id="action" style="font-weight: 600;">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/enhanced/score', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        lat: 23.0225,
                        lng: 72.5714,
                        use_case: 'retail'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                displayResults(data);
                
            } catch (error) {
                alert(`API Error: ${error.message}`);
            }
        }
        
        function displayResults(data) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('score').textContent = data.composite_score;
            document.getElementById('location').textContent = `${data.location.latitude}, ${data.location.longitude}`;
            
            // Demographics
            document.getElementById('demo-score').textContent = data.demographics.score;
            document.getElementById('demo-bar').style.width = `${data.demographics.score}%`;
            
            // Competition
            document.getElementById('comp-score').textContent = data.shops.score;
            document.getElementById('comp-bar').style.width = `${data.shops.score}%`;
            
            // Transport
            document.getElementById('trans-score').textContent = data.transport.score;
            document.getElementById('trans-bar').style.width = `${data.transport.score}%`;
            
            // Recommendation
            document.getElementById('recommendation').textContent = data.recommendation.recommendation;
            document.getElementById('reason').textContent = data.recommendation.reason;
            document.getElementById('action').textContent = `✅ ${data.recommendation.action}`;
        }
        
        function testResponsive() {
            alert('Resize your browser window to test responsive layout!\n\n' +
                  '• Desktop: Side-by-side layout\n' +
                  '• Tablet: Stacked layout (768px)\n' +
                  '• Mobile: Compact layout (480px)');
        }
        
        // Test responsiveness on load
        window.addEventListener('resize', function() {
            const width = window.innerWidth;
            const mapSection = document.querySelector('.map-section');
            
            if (width <= 768) {
                mapSection.innerHTML = '📱 Mobile Layout<br><small style="font-size: 16px; font-weight: normal;">Width: ' + width + 'px</small>';
            } else {
                mapSection.innerHTML = '🖥️ Desktop Layout<br><small style="font-size: 16px; font-weight: normal;">Width: ' + width + 'px</small>';
            }
        });
    </script>
</body>
</html>
